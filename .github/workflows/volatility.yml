name: Volatility Top 10

on:
  schedule:
    - cron: '0 11,23 * * *'  # 每天 11:00 和 23:00 执行
  workflow_dispatch:  # 允许手动触发

jobs:
  run-volatility:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Create .env file
        run: |
          cat > .env << 'EOL'
          # SMTP Email
          SMTP_HOST=${{ secrets.SMTP_HOST }}
          SMTP_PORT=${{ secrets.SMTP_PORT }}
          SMTP_USER=${{ secrets.SMTP_USER }}
          SMTP_PASS=${{ secrets.SMTP_PASS }}
          SMTP_USE_TLS=${{ secrets.SMTP_USE_TLS || 'false' }}
          SMTP_USE_SSL=${{ secrets.SMTP_USE_SSL || 'true' }}
          EMAIL_FROM=${{ secrets.EMAIL_FROM }}
          EMAIL_TO=${{ secrets.EMAIL_TO }}
          EOL
      
      - name: Run volatility script
        run: python volatility_top10.py --email
      
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: volatility-results
          path: volatility_top10.json
